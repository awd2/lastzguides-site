<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Last Z HQ Requirements Pinterest Pin</title>
  <desc id="desc">A vertical Pinterest pin for the Last Z HQ requirements guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2c43"/>
      <stop offset="0.55" stop-color="#3b7c6e"/>
      <stop offset="1" stop-color="#e6a33e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#061121" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1000" height="1500" fill="url(#bg)"/>
  <path d="M0 1045 C150 990 285 1020 420 935 C585 830 760 930 1000 792 L1000 1500 L0 1500 Z" fill="#f6efe4" opacity="0.97"/>
  <g transform="translate(76 86)">
    <rect x="0" y="0" width="260" height="54" rx="27" fill="#f6efe4" opacity="0.94"/>
    <text x="28" y="36" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#14233b">LAST Z GUIDES</text>
  </g>
  <g transform="translate(76 216)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Last Z HQ</text>
    <text x="0" y="88" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Requirements</text>
    <text x="0" y="166" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#ffe7bd">Check buildings before you start upgrades</text>
  </g>
  <g filter="url(#shadow)" transform="translate(76 510)">
    <rect width="848" height="500" rx="34" fill="#ffffff"/>
    <text x="48" y="80" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#14233b">Use it before spending speedups</text>
    <g font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#1d2c43">
      <text x="52" y="158"><tspan font-weight="800" fill="#b96118">1.</tspan> Find your current HQ level</text>
      <text x="52" y="236"><tspan font-weight="800" fill="#b96118">2.</tspan> Check required side buildings</text>
      <text x="52" y="314"><tspan font-weight="800" fill="#b96118">3.</tspan> Pre-build bottlenecks early</text>
      <text x="52" y="392"><tspan font-weight="800" fill="#b96118">4.</tspan> Avoid stalled upgrade queues</text>
    </g>
  </g>
  <g transform="translate(76 1114)">
    <rect width="848" height="164" rx="30" fill="#14233b"/>
    <text x="46" y="64" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#ffffff">HQ upgrade table and planning checks</text>
    <text x="46" y="118" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#f7c15d">lastzguides.com/hq.html</text>
  </g>
  <text x="76" y="1390" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#14233b">Independent Last Z: Survival Shooter guide</text>
</svg>
