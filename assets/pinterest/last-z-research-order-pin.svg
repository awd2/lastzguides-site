<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Last Z Research Order Pinterest Pin</title>
  <desc id="desc">A vertical Pinterest pin for the Last Z research guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12213a"/>
      <stop offset="0.55" stop-color="#1f5f6f"/>
      <stop offset="1" stop-color="#f0b44b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#061121" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1000" height="1500" fill="url(#bg)"/>
  <path d="M0 1130 C190 1015 360 1210 560 1095 C735 995 830 1060 1000 975 L1000 1500 L0 1500 Z" fill="#f7f2e8" opacity="0.96"/>
  <circle cx="860" cy="150" r="98" fill="#f7f2e8" opacity="0.16"/>
  <circle cx="120" cy="1290" r="140" fill="#1f5f6f" opacity="0.14"/>
  <g transform="translate(76 86)">
