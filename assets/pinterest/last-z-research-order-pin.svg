      <text x="52" y="232"><tspan font-weight="800" fill="#c26b18">2.</tspan> Military Strategies</text>
      <text x="52" y="310"><tspan font-weight="800" fill="#c26b18">3.</tspan> Peace Shield / Urgent Rescue</text>
