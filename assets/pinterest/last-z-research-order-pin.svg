  </g>
  <g transform="translate(76 214)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Last Z</text>
    <text x="0" y="88" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Research Order</text>
    <text x="0" y="166" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#ffe7bd">Best priority path for most accounts</text>
  </g>
  <g filter="url(#shadow)" transform="translate(76 506)">
